<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurelia — Premium Digital & Physical Goods</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://payhip.com/payhip.js"></script>

<style>

/* ===== THEME TOKENS ===== */

:root {
  --bg:        #ffffff;
  --surface:   #ffffff;
  --surface2:  #f8fafc;
  --border:    #e2e8f0;
  --text:      #0f172a;
  --text-muted:#475569;
  --header-bg: rgba(255,255,255,.85);
  --shadow:    rgba(15,23,42,.08);
  --drawer-bg: #ffffff;
  --accent:    #6366f1;
  --accent-deep:#8b5cf6;
  --accent-soft:#eef2ff;
  --accent-tertiary:#06b6d4;
  --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
  --success:   #06b6d4;
  --danger:    #ef4444;
  --radius:    16px;
}

[data-theme="dark"] {
  --bg:        #0f172a;
  --surface:   #1e293b;
  --surface2:  #1e293b;
  --border:    #334155;
  --text:      #f1f5f9;
  --text-muted:#cbd5e1;
  --header-bg: rgba(15,23,42,.9);
  --shadow:    rgba(0,0,0,.5);
  --drawer-bg: #1e293b;
  --accent:    #818cf8;
  --accent-deep:#a78bfa;
  --accent-soft:#1e1b4b;
  --accent-tertiary:#22d3ee;
  --gradient-primary: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #22d3ee 100%);
  --success:   #22d3ee;
  --danger:    #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background .3s, color .3s;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== BACKGROUND ANIMATION ===== */

.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===== HEADER ===== */

header {
  background: var(--header-bg);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  transition: background .3s;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 21px;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--text);
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: var(--gradient-primary);
  color: #ffffff;
  font-weight: 800;
  font-family: 'Space Grotesk', sans-serif;
  box-shadow: 0 4px 12px rgba(99,102,241,.4);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 12px;
  padding: 12px 18px;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
  transition: opacity .2s, transform .1s, background .2s, box-shadow .2s;
}

button:active { transform: scale(.97); }

/* Theme toggle */
.theme-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  color: var(--text);
  padding: 0;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  font-size: 18px;
  line-height: 1;
  border: 1px solid var(--border);
  transition: background .3s, color .3s, border-color .2s;
}

.theme-toggle:hover { border-color: var(--accent); }

.checkout-button {
  background: var(--gradient-primary);
  color: #fff;
  box-shadow: 0 4px 14px rgba(99,102,241,.35);
}

.checkout-button:hover { box-shadow: 0 6px 18px rgba(99,102,241,.5); }

@media (max-width: 768px) {
  .checkout-button { display: none; }
}

/* ===== VIEW CART BUTTON + BADGE ===== */

.view-cart-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--text);
  color: var(--surface);
  padding: 11px 18px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 12px;
  transition: opacity .2s, transform .1s;
}

.view-cart-btn:hover { opacity: .88; }

.cart-badge {
  background: var(--danger);
  color: #fff;
  min-width: 20px;
  height: 20px;
  border-radius: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 12px;
  font-weight: 800;
  padding: 0 5px;
  line-height: 1;
  transform: scale(1);
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
}

.cart-badge.pop {
  animation: badge-pop .35s cubic-bezier(.34,1.56,.64,1) forwards;
}

@keyframes badge-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.55); }
  100% { transform: scale(1); }
}

/* ===== PAGE LAYOUT: desktop side-by-side ===== */

.page-body {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  max-width: 100%;
  min-height: calc(100vh - 60px);
}

/* ===== HERO ===== */

.hero {
  max-width: 1280px;
  margin: 0 auto;
  padding: 56px 24px 8px;
  text-align: center;
}

.hero .eyebrow {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 50px;
  background: var(--accent-soft);
  color: var(--accent-deep);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.hero h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(32px, 6vw, 54px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.05;
  color: var(--text);
  max-width: 16ch;
  margin: 0 auto;
  text-wrap: balance;
}

.hero p {
  margin: 18px auto 0;
  max-width: 52ch;
  color: var(--text-muted);
  font-size: 17px;
  line-height: 1.6;
  text-wrap: pretty;
}

/* ===== PRODUCTS ===== */

.products-area {
  flex: 1 1 0;
  min-width: 0;
  padding: 20px 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 26px;
  align-content: start;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}

@property --neon-angle {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}

@keyframes neon-spin {
  to { --neon-angle: 360deg; }
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 3px var(--shadow);
  transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s, border-color .25s, background .3s;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Animated neon border around each product card */
.product-card::before,
.product-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  padding: 2px;
  pointer-events: none;
  z-index: 40;
  background: conic-gradient(
    from var(--neon-angle, 0deg),
    #00e5ff,
    #18ffb0,
    #ff00e6,
    #ffd500,
    #00e5ff
  );
  /* show only the border ring */
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
          mask-composite: exclude;
  animation: neon-spin 6s linear infinite;
}

/* Blurred layer for the glow */
.product-card::after {
  filter: blur(7px);
  opacity: .8;
}

/* Fallback rotation for browsers without @property support */
@supports not (background: conic-gradient(from var(--neon-angle))) {
  .product-card::before,
  .product-card::after {
    background: conic-gradient(#00e5ff, #18ffb0, #ff00e6, #ffd500, #00e5ff);
    animation: neon-rotate 6s linear infinite;
  }
  @keyframes neon-rotate {
    to { transform: rotate(360deg); }
  }
}

@media (prefers-reduced-motion: reduce) {
  .product-card::before,
  .product-card::after { animation: none; }
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px var(--shadow);
  border-color: var(--accent);
}

/* Category badge */
.category-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 25;
  padding: 6px 13px;
  border-radius: 50px;
  background: var(--header-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.product-preview {
  height: 900px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

.product-preview .payhip-embed-page,
.product-preview .payhip-embed-page iframe {
  width: 100%;
  height: 100%;
}

.product-actions {
  padding: 18px 20px;
  text-align: center;
  background: var(--surface);
  position: relative;
  bottom: 0;
  z-index: 20;
  border-radius: 0 0 var(--radius) var(--radius);
}

/* Hide "Buy Now" / purchase buttons inside Payhip iframes */
.payhip-embed-page iframe {
  pointer-events: none; /* prevent direct interaction that triggers buy */
}

/* ===== BRIGHT GOLD ADD TO CART ===== */

.add-button {
  position: relative;
  width: 100%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--gradient-primary);
  color: #ffffff;
  padding: 14px 40px;
  font-size: 15px;
  font-weight: 700;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(99,102,241,.4);
  letter-spacing: .2px;
  overflow: hidden;
  transition: box-shadow .2s, transform .15s, background .2s;
  /* Attention-grabbing pulse to prompt clicks */
  animation: atc-pulse 1.6s ease-in-out infinite;
  transform-origin: center;
}

/* Glossy sweep that travels across the button */
.add-button::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    100deg,
    transparent 0%,
    rgba(255,255,255,.55) 50%,
    transparent 100%
  );
  transform: skewX(-20deg);
  animation: atc-shine 2.6s ease-in-out infinite;
  pointer-events: none;
}

.add-button:hover {
  box-shadow: 0 6px 20px rgba(99,102,241,.55);
  transform: translateY(-2px) scale(1.02);
}

/* Keep the animation running once added to the cart */
.add-button.selected {
  background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
  color: #fff;
  box-shadow: 0 4px 14px rgba(6,182,212,.45);
  animation: atc-pulse-green 1.6s ease-in-out infinite;
}

@keyframes atc-pulse {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 4px 14px rgba(99,102,241,.4);
  }
  50% {
    transform: scale(1.04);
    box-shadow: 0 6px 22px rgba(139,92,246,.6);
  }
}

@keyframes atc-pulse-green {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 4px 14px rgba(6,182,212,.45);
  }
  50% {
    transform: scale(1.04);
    box-shadow: 0 6px 22px rgba(6,182,212,.65);
  }
}

@keyframes atc-shine {
  0%   { left: -150%; }
  55%  { left: 150%; }
  100% { left: 150%; }
}

@media (prefers-reduced-motion: reduce) {
  .add-button,
  .add-button.selected { animation: none; }
  .add-button::after { animation: none; display: none; }
}

/* ===== DESKTOP CART DRAWER (slides in from right) ===== */

.cart-sidebar {
  width: 380px;
  flex-shrink: 0;
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--drawer-bg);
  border-left: 1px solid var(--border);
  box-shadow: -6px 0 30px var(--shadow);
  transition: transform .35s cubic-bezier(.4,0,.2,1), background .3s;
  transform: translateX(100%);
  z-index: 400;
}

.cart-sidebar.cart-open {
  transform: translateX(0);
}

.cart-header {
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.cart-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

/* Close button — always visible in drawer */
#closeCart {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  background: var(--surface2);
  color: var(--text);
  padding: 0;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

#closeCart:hover { color: var(--danger); }

/* Drawer overlay (desktop + mobile) */
.cart-mobile-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 399;
}

.cart-mobile-overlay.active {
  display: block;
}

.cart-items {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
}

.cart-empty {
  color: var(--text-muted);
  text-align: center;
  margin-top: 40px;
  font-size: 15px;
}

/* Cart item with image */
.cart-item {
  border: 1px solid var(--border);
  padding: 11px;
  margin-bottom: 10px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  transition: background .3s;
}

.cart-item-img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
  background: var(--border);
}

.cart-item-info {
  flex: 1;
  min-width: 0;
}

.cart-item-name {
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cart-item-price {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

.remove-button {
  background: #dc2626;
  color: #fff;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  flex-shrink: 0;
}

/* Totals */
.cart-totals {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  transition: background .3s;
}

.totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.totals-row.grand {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  margin-top: 9px;
  padding-top: 9px;
  border-top: 2px solid var(--border);
  margin-bottom: 0;
}

.totals-row span:last-child { font-weight: 600; color: var(--text); }
.totals-row.grand span:last-child { color: var(--accent-deep); }

.cart-footer {
  padding: 14px;
  border-top: 1px solid var(--border);
}

.checkout-link {
  display: block;
  text-align: center;
  background: var(--gradient-primary);
  color: #fff;
  padding: 15px;
  text-decoration: none;
  border-radius: 12px;
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 14px;
  box-shadow: 0 4px 14px rgba(99,102,241,.35);
  transition: opacity .2s;
}

.checkout-link:hover { opacity: .88; }

.clear-button {
  width: 100%;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

/* Fly animation */
.fly-product {
  position: fixed;
  width: 60px;
  height: 60px;
  background: #6366f1;
  border-radius: 12px;
  z-index: 99999;
  pointer-events: none;
  transition: .75s ease;
}

/* ===== MOBILE: bottom-sheet cart ===== */

@media (max-width: 768px) {

  .cart-sidebar {
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 75vh;
    border-left: none;
    border-top: 2px solid var(--border);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -6px 30px rgba(0,0,0,.18);
    /* Override the right-slide transform with bottom-slide */
    transform: translateY(100%);
    transition: transform .35s ease, background .3s;
    z-index: 500;
  }

  .cart-sidebar.cart-open {
    transform: translateY(0);
  }

  .cart-mobile-overlay { z-index: 499; }

  /* Products area: full width, tighter */
  .products-area {
    grid-template-columns: 1fr;
    padding: 16px 12px;
    gap: 16px;
  }

  /* Shorter product preview on mobile */
  .product-preview {
      background: #000000;
    height: 780px;
    overflow: hidden;
  }

.product-actions {
  padding: 12px 16px;
  background-color: #000;
}

  .add-button {
    padding: 11px 32px;
    font-size: 14px;
  }

}

/* ===== SHOP TOOLBAR (search / filter / sort) ===== */

.shop-wrap {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.shop-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 28px 24px 0;
}

.search-wrap {
  position: relative;
  flex: 1 1 280px;
  min-width: 0;
}

.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

#searchInput {
  width: 100%;
  padding: 13px 16px 13px 44px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color .2s, background .3s, color .3s;
}

#searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.toolbar-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.toolbar-controls select {
  appearance: none;
  -webkit-appearance: none;
  padding: 13px 40px 13px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background-color: var(--surface);
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%2394a3b8' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 14px center;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  transition: border-color .2s, background-color .3s, color .3s;
}

.toolbar-controls select:focus { border-color: var(--accent); }
.toolbar-controls select:hover { border-color: var(--accent); }

.results-bar {
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 18px 24px 0;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
}

.product-card.hidden { display: none; }

.no-results {
  display: none;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 16px;
}

@media (max-width: 768px) {
  .hero { padding: 32px 16px 4px; }
  .shop-toolbar { padding: 18px 16px 0; }
  .toolbar-controls { width: 100%; }
  .toolbar-controls select { flex: 1 1 0; }
  .results-bar { padding: 14px 16px 0; }
}

</style>
</head>

<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<header>
  <div class="header-inner">
    <div class="logo"><span class="logo-mark">A</span>Aurelia</div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      <!-- View Cart button — visible on all screen sizes -->
      <button class="view-cart-btn" id="viewCartBtn" aria-label="View cart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        View Cart
        <span class="cart-badge" id="cartCount">0</span>

<script>

/* ===== HIDE PAYHIP "BUY NOW" BUTTONS ===== */

(function hideBuyNow(){
  function injectStyle(doc){
    try {
      const s = doc.createElement("style");
      s.textContent =
        'a[href*="payhip.com/b/"],button[class*="buy"],a[class*="buy"],' +
        '.buy-now,.buy-button,[data-cy="buy-btn"],[data-cy="purchase-btn"],' +
        '.product-page__purchase-block button,' +
        '.payhip-btn-buy { display: none !important; }';
      (doc.head || doc.documentElement).appendChild(s);
    } catch(e){}
  }

  /* Inject into every iframe that loads a payhip page */
  function processFrame(iframe){
    try {
      injectStyle(iframe.contentDocument || iframe.contentWindow.document);
    } catch(e){}
  }

  document.querySelectorAll("iframe").forEach(processFrame);

  const observer = new MutationObserver(muts => {
    muts.forEach(m => {
      m.addedNodes.forEach(node => {
        if(node.tagName === "IFRAME") processFrame(node);
        if(node.querySelectorAll){
          node.querySelectorAll("iframe").forEach(processFrame);
        }
      });
    });
  });

  observer.observe(document.body, { childList: true, subtree: true });

  /* Re-run every second for iframes that load late */
  let attempts = 0;
  const interval = setInterval(() => {
    document.querySelectorAll("iframe").forEach(processFrame);
    if(++attempts > 20) clearInterval(interval);
  }, 1000);
})();


/* ===== BACKGROUND ANIMATION ===== */

(function(){
  const canvas = document.getElementById("bgCanvas");
  const ctx    = canvas.getContext("2d");
  let W, H, particles = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randBetween(a, b){ return a + Math.random()*(b-a); }

  function createParticle(){
    return {
      x:     Math.random() * (W || 800),
      y:     Math.random() * (H || 600),
      r:     randBetween(1.5, 4),
      dx:    randBetween(-.35, .35),
      dy:    randBetween(-.35, .35),
      alpha: randBetween(.08, .22)
    };
  }

  function init(){
    resize();
    particles = [];
    const count = Math.floor((W * H) / 14000);
    for(let i = 0; i < count; i++) particles.push(createParticle());
  }

  function getColor(){
    return document.documentElement.getAttribute("data-theme") === "dark"
      ? "200,180,60" : "100,130,220";
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    const col = getColor();

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba("+col+","+p.alpha+")";
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if(p.x < -10)  p.x = W + 10;
      if(p.x > W+10) p.x = -10;
      if(p.y < -10)  p.y = H + 10;
      if(p.y > H+10) p.y = -10;
    });

    for(let i = 0; i < particles.length; i++){
      for(let j = i+1; j < particles.length; j++){
        const dx   = particles[i].x - particles[j].x;
        const dy   = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = "rgba("+col+","+(0.06*(1-dist/120))+")";
          ctx.lineWidth = .8;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", init);
  init();
  draw();
})();


/* ===== LIGHT / DARK TOGGLE ===== */

const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", function(){
  const html   = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  themeToggle.innerHTML = isDark
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
});


/* ===== CART DRAWER (desktop right-slide + mobile bottom-sheet) ===== */

const cartSidebar       = document.getElementById("cartSidebar");
const cartMobileOverlay = document.getElementById("cartMobileOverlay");

function isMobile(){ return window.innerWidth <= 768; }

function openCart(){
  cartSidebar.classList.add("cart-open");
  cartMobileOverlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeCart(){
  cartSidebar.classList.remove("cart-open");
  cartMobileOverlay.classList.remove("active");
  document.body.style.overflow = "";
}

document.getElementById("viewCartBtn").addEventListener("click", openCart);
document.getElementById("closeCart").addEventListener("click", closeCart);
cartMobileOverlay.addEventListener("click", closeCart);


/* ===== CART LOGIC ===== */

const TAX_RATE = 0.15;
let cart = [];

const cartCountEl  = document.getElementById("cartCount");
const cartItemsEl  = document.getElementById("cartItems");
const cartTotalsEl = document.getElementById("cartTotals");
const subtotalEl   = document.getElementById("subtotalVal");
const taxEl        = document.getElementById("taxVal");
const totalEl      = document.getElementById("totalVal");

function formatUSD(val){
  return "$" + Number(val).toFixed(2);
}

function buildCheckoutUrl(){
  if(cart.length === 0) return "#";
  /* Payhip multi-item cart format: s=1 + cart_links[] + per-item qty[id] */
  const links = cart.map(item =>
    "cart_links%5B%5D=" + encodeURIComponent(item.id)).join("&");
  const qtys = cart.map(item =>
    "qty%5B" + encodeURIComponent(item.id) + "%5D=" + (item.qty || 1)).join("&");
  return "https://payhip.com/buy?s=1&" + links + "&" + qtys;
}

function updateCart(){
  const prevCount = parseInt(cartCountEl.textContent) || 0;
  cartCountEl.textContent = cart.length;
  /* Animate badge when count increases */
  if(cart.length > prevCount){
    cartCountEl.classList.remove("pop");
    void cartCountEl.offsetWidth; /* reflow to restart animation */
    cartCountEl.classList.add("pop");
  }
  document.getElementById("checkoutButton").textContent = "Checkout (" + cart.length + ")";
  document.getElementById("checkoutLink").href = buildCheckoutUrl();

  if(cart.length === 0){
    cartItemsEl.innerHTML = '<p class="cart-empty">Your cart is empty</p>';
    cartTotalsEl.style.display = "none";
    return;
  }

  cartItemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img"
           src="${item.img}"
           alt="${item.name}"
           onerror="this.style.display='none'">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${formatUSD(item.price)}</div>
      </div>
      <button class="remove-button" onclick="removeItem('${item.id}')">Remove</button>
    </div>
  `).join("");

  const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
  const tax      = subtotal * TAX_RATE;
  const total    = subtotal + tax;

  subtotalEl.textContent = formatUSD(subtotal);
  taxEl.textContent      = formatUSD(tax);
  totalEl.textContent    = formatUSD(total);
  cartTotalsEl.style.display = "block";
}

function removeItem(id){
  cart = cart.filter(item => item.id !== id);
  const btn = document.querySelector('[data-id="' + id + '"] .add-button');
  if(btn){
    btn.textContent = "Add To Cart";
    btn.classList.remove("selected");
  }
  updateCart();
}

function animateCart(card){
  const start = card.getBoundingClientRect();
  const target = document.getElementById("viewCartBtn").getBoundingClientRect();

  const fly = document.createElement("div");
  fly.className = "fly-product";
  fly.style.left = start.left + "px";
  fly.style.top  = start.top  + "px";
  document.body.appendChild(fly);

  requestAnimationFrame(() => {
    fly.style.left      = target.left + "px";
    fly.style.top       = target.top  + "px";
    fly.style.transform = "scale(.1)";
    fly.style.opacity   = "0";
  });

  setTimeout(() => fly.remove(), 800);
}

document.querySelectorAll(".add-button").forEach(button => {
  button.addEventListener("click", function(){
    const card  = this.closest(".product-card");
    const id    = card.dataset.id;
    const name  = card.dataset.name;
    const price = parseFloat(card.dataset.price) || 0;
    const img   = card.dataset.img || "";

    if(cart.some(item => item.id === id)) return;

    cart.push({ id, name, price, img });
    this.innerHTML = "Added &#10003;";
    this.classList.add("selected");

    animateCart(card);
    updateCart();
  });
});

function openCheckout(){
  const payhipUrl = buildCheckoutUrl();
  if(payhipUrl === "#"){ alert("Your cart is empty"); return; }

  /* Hand the themed checkout.html everything it needs:
     the generated Payhip URL, a rich cart summary, and the active theme. */
  const theme = document.documentElement.getAttribute("data-theme") || "light";
  const url = "checkout.html"
            + "?url="   + encodeURIComponent(payhipUrl)
            + "&cart="  + encodeURIComponent(JSON.stringify(cart))
            + "&theme=" + theme;

  const W2 = 1200, H2 = 900;
  const left = (screen.width  - W2) / 2;
  const top  = (screen.height - H2) / 2;
  const win = window.open(url, "AureliaCheckout",
    "width="+W2+",height="+H2+",left="+left+",top="+top+",resizable=yes,scrollbars=yes");
  /* Fallback: if the pop-up is blocked, navigate in the same tab. */
  if(!win){ window.location.href = url; }
}

document.getElementById("checkoutButton").addEventListener("click", openCheckout);
document.getElementById("checkoutLink").addEventListener("click", function(e){
  e.preventDefault();
  openCheckout();
});

document.getElementById("clearCart").addEventListener("click", function(){
  cart = [];
  document.querySelectorAll(".add-button").forEach(btn => {
    btn.textContent = "Add To Cart";
    btn.classList.remove("selected");
  });
  updateCart();
});

updateCart();


/* ===== CATEGORY FILTER / SORT / SEARCH ===== */

(function(){
  const grid           = document.querySelector(".products-area");
  const cards          = Array.from(grid.querySelectorAll(".product-card"));
  const searchInput    = document.getElementById("searchInput");
  const categoryFilter = document.getElementById("categoryFilter");
  const sortSelect     = document.getElementById("sortSelect");
  const resultsCount   = document.getElementById("resultsCount");
  const noResults      = document.getElementById("noResults");

  /* Build category dropdown from product data + add badges to cards */
  const cats = [...new Set(cards.map(c => c.dataset.category).filter(Boolean))].sort();
  cats.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    categoryFilter.appendChild(opt);
  });

  cards.forEach(card => {
    if(card.dataset.category && !card.querySelector(".category-badge")){
      const badge = document.createElement("span");
      badge.className = "category-badge";
      badge.textContent = card.dataset.category;
      card.appendChild(badge);
    }
  });

  function apply(){
    const q   = searchInput.value.trim().toLowerCase();
    const cat = categoryFilter.value;

    let visible = cards.filter(card => {
      const name = (card.dataset.name || "").toLowerCase();
      const cCat = card.dataset.category || "";
      const matchesQuery    = !q || name.includes(q);
      const matchesCategory = cat === "all" || cCat === cat;
      return matchesQuery && matchesCategory;
    });

    const sort = sortSelect.value;
    if(sort !== "default"){
      visible.sort((a, b) => {
        const pa = parseFloat(a.dataset.price) || 0;
        const pb = parseFloat(b.dataset.price) || 0;
        const na = a.dataset.name || "";
        const nb = b.dataset.name || "";
        switch(sort){
          case "price-asc":  return pa - pb;
          case "price-desc": return pb - pa;
          case "name-asc":   return na.localeCompare(nb);
          case "name-desc":  return nb.localeCompare(na);
        }
        return 0;
      });
    }

    /* Hide everything, then reveal + reorder the matches */
    cards.forEach(c => c.classList.add("hidden"));
    visible.forEach(c => {
      c.classList.remove("hidden");
      grid.appendChild(c);
    });

    resultsCount.textContent = visible.length + (visible.length === 1 ? " product" : " products");
    noResults.style.display  = visible.length === 0 ? "block" : "none";
  }

  searchInput.addEventListener("input", apply);
  categoryFilter.addEventListener("change", apply);
  sortSelect.addEventListener("change", apply);
  apply();
})();

</script>
